name: CI

on:
  push:
    branches: [main]
  pull_request:

# npm/Tauri frontend build is intentionally not part of CI yet: npm install for
# the dowse-app frontend is slow in CI and its output is a UI that needs eyes
# on it to validate, not something a green checkmark can confirm. Revisit once
# there's a headless visual check worth running.

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Format check
        run: cargo fmt --check
