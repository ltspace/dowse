name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: crates/dowse-app/package-lock.json

      - name: Install frontend dependencies
        working-directory: crates/dowse-app
        run: npm ci

      # issue #13:CLI 作为 Tauri sidecar 打进安装包。externalBin 要求文件名
      # 带 target triple 后缀,构建前先编好 CLI 并复制到约定路径。
      - name: Build CLI sidecar
        shell: pwsh
        run: |
          cargo build --release -p dowse
          New-Item -ItemType Directory -Force crates/dowse-app/src-tauri/binaries | Out-Null
          Copy-Item target/release/dowse.exe crates/dowse-app/src-tauri/binaries/dowse-x86_64-pc-windows-msvc.exe

      - name: Build Tauri bundle
        working-directory: crates/dowse-app
        run: npm run tauri build

      - name: Compute checksums
        shell: pwsh
        run: |
          $patterns = @(
            "target/release/bundle/nsis/*-setup.exe",
            "target/release/bundle/msi/*.msi"
          )
          $installers = @()
          foreach ($pattern in $patterns) {
            $installers += Get-ChildItem -Path $pattern -File -ErrorAction SilentlyContinue
          }
          if ($installers.Count -eq 0) {
            Write-Error "No installers found under target/release/bundle"
            exit 1
          }
          $checksums = "checksums.txt"
          if (Test-Path $checksums) { Remove-Item $checksums }
          foreach ($installer in $installers) {
            $hash = (Get-FileHash -Algorithm SHA256 -Path $installer.FullName).Hash.ToLower()
            "$hash  $($installer.Name)" | Out-File -FilePath $checksums -Append -Encoding ascii
          }

      - name: Create draft release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $assets = @(Get-ChildItem -Recurse -Path target/release/bundle -Include *.exe,*.msi | ForEach-Object { $_.FullName })
          $assets += (Resolve-Path checksums.txt).Path
          gh release create $tag --draft --title $tag --notes "" @assets
