name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem are you running into? What can't you currently do?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What would you like dowse to do instead?
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context (optional)
      description: Alternatives you've considered, related tools, links, etc.
    validations:
      required: false
